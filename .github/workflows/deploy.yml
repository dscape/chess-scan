name: deploy

on:
  workflow_run:
    workflows: [ci]
    branches: [main]
    types: [completed]

permissions:
  contents: read

jobs:
  dispatch:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch infra deploy
        env:
          S46_INFRA_DISPATCH_TOKEN: ${{ secrets.S46_INFRA_DISPATCH_TOKEN }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
          SOURCE_REF: ${{ github.event.workflow_run.head_branch }}
          SOURCE_RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          set -euo pipefail

          if [[ -z "${S46_INFRA_DISPATCH_TOKEN:-}" ]]; then
            echo 'error: set the S46_INFRA_DISPATCH_TOKEN secret' >&2
            exit 1
          fi

          jq -n \
            --arg stack chess \
            --arg repository "$SOURCE_REPOSITORY" \
            --arg sha "$SOURCE_SHA" \
            --arg ref "$SOURCE_REF" \
            --arg sourceRunUrl "$SOURCE_RUN_URL" \
            '{event_type: "deploy", client_payload: {stack: $stack, repository: $repository, sha: $sha, ref: $ref, source_run_url: $sourceRunUrl}}' \
            > payload.json

          curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${S46_INFRA_DISPATCH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            https://api.github.com/repos/sovereign46/infra/dispatches \
            --data @payload.json

          echo "dispatched chess deploy for ${SOURCE_SHA}"
