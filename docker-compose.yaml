services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - chess-scan-data:/app/data
    restart: unless-stopped

  trainer:
    profiles: ["training"]
    build:
      context: .
      dockerfile: Dockerfile.ml
    environment:
      CHESS_SCAN_ARGUS_DATA_DIR: /app/training-data/argus-2026-03-29
      CHESS_SCAN_PLATFORM_DATA_DIR: /app/training-data/platforms-v1
      CHESS_SCAN_PRINT_DATA_DIR: /app/training-data/print-regressions-v1
    volumes:
      - chess-scan-data:/app/data
      - ${CHESS_SCAN_TRAINING_DATA_DIR:-~/chess-scan-training}:/app/training-data:ro
    command: ["python", "scripts/train_candidate.py"]

  learner:
    profiles: ["learning"]
    build:
      context: .
      dockerfile: Dockerfile.ml
    environment:
      CHESS_SCAN_ARGUS_DATA_DIR: /app/training-data/argus-2026-03-29
      CHESS_SCAN_PLATFORM_DATA_DIR: /app/training-data/platforms-v1
      CHESS_SCAN_PRINT_DATA_DIR: /app/training-data/print-regressions-v1
    volumes:
      - chess-scan-data:/app/data
      - ${CHESS_SCAN_TRAINING_DATA_DIR:-~/chess-scan-training}:/app/training-data:ro
    command: ["python", "scripts/automatic_learner.py"]
    restart: unless-stopped

volumes:
  chess-scan-data:
